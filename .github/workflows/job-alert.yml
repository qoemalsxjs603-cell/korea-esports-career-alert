name: Focused Esports Job Alert v9.1

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "실행 방식"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - test_email
          - diagnostic
          - notify_t1_current
          - reset_baseline

permissions:
  contents: write

concurrency:
  group: focused-esports-job-alert-v9
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: 저장소 불러오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 코드 자체 점검
        run: python job_alert.py --self-test

      - name: 공고 확인
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          ACTION="${{ github.event.inputs.action }}"
          if [ "$ACTION" = "test_email" ]; then
            python job_alert.py --test-email
          elif [ "$ACTION" = "diagnostic" ]; then
            python job_alert.py --diagnostic
          elif [ "$ACTION" = "notify_t1_current" ]; then
            python job_alert.py --notify-t1-current
          elif [ "$ACTION" = "reset_baseline" ]; then
            python job_alert.py --reset-baseline
          else
            python job_alert.py
          fi

      - name: 상태와 진단 보고서 저장
        if: github.event.inputs.action != 'test_email'
        run: |
          if git diff --quiet -- data/state.json data/last_run_report.json; then
            echo "저장할 변경 없음"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/last_run_report.json
          git commit -m "chore: update v9 job alert state [skip ci]"

          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && \
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            sleep 5
          done
          exit 1
